<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Memorama Imprimible</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
  
  * {
    box-sizing: border-box;
  }
  
  body {
    margin: 0;
    padding: 0;
    background: #f8f9fa;
    font-family: 'Fredoka One', cursive, sans-serif;
  }

  .print-controls {
    text-align: center;
    padding: 30px;
    background: #fff;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .print-controls h1 {
    margin-top: 0;
    color: #ff6b6b;
    font-size: 2.5rem;
  }

  .print-controls p {
    font-size: 1.2rem;
    color: #555;
    margin-bottom: 20px;
  }

  .btn {
    background: #4ecdc4;
    color: white;
    border: none;
    padding: 15px 35px;
    font-size: 1.5rem;
    font-family: 'Fredoka One', cursive;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 0 #38b000;
    transition: transform 0.1s, background 0.2s;
  }
  
  .btn:hover {
    background: #45b7d1;
  }

  .btn:active {
    transform: translateY(6px);
    box-shadow: 0 0 0 #38b000;
  }

  /* Carta Layout */
  .page {
    width: 21.59cm;
    height: 27.94cm; /* Letter size */
    margin: 0 auto 30px;
    background: white;
    padding: 1cm;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    justify-content: center;
    gap: 0.5cm;
    page-break-after: always;
  }

  .card {
    width: 6cm;
    height: 8cm;
    border: 4px dashed #ccc;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    /* This ensures colors print exactly as shown */
    -webkit-print-color-adjust: exact;
    color-adjust: exact;
    print-color-adjust: exact;
  }

  /* Inner colored border */
  .card::before {
    content: '';
    position: absolute;
    top: 6px; left: 6px; right: 6px; bottom: 6px;
    border: 6px solid currentColor;
    border-radius: 8px;
    opacity: 0.3;
  }

  .number {
    font-size: 4.5rem;
    line-height: 1;
    margin-bottom: 5px;
    text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
  }

  .text {
    font-size: 1.6rem;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  @media print {
    body {
      background: none;
    }
    .print-controls {
      display: none !important;
    }
    .page {
      margin: 0;
      box-shadow: none;
      padding: 0;
      width: 100%;
      height: auto;
      page-break-after: always;
    }
    .card {
      page-break-inside: avoid;
    }
  }
</style>
</head>
<body>

  <div class="print-controls">
    <h1>¡Tu Memorama está Listo! 🎨</h1>
    <p>Para guardarlo como PDF o imprimirlo, haz clic en el botón de abajo y asegúrate de elegir <strong>"Guardar como PDF"</strong> o tu impresora.</p>
    <button class="btn" onclick="window.print()">Generar PDF / Imprimir 🖨️</button>
  </div>

  <div id="pages-container"></div>

  <script>
    // Colores vibrantes y llamativos para niños
    const data = [
      { num: 1, text: 'uno', color: '#FF3366' },
      { num: 2, text: 'dos', color: '#FF9933' },
      { num: 3, text: 'tres', color: '#00CC66' },
      { num: 4, text: 'cuatro', color: '#0099FF' },
      { num: 5, text: 'cinco', color: '#9933CC' },
      { num: 6, text: 'seis', color: '#FF6600' },
      { num: 7, text: 'siete', color: '#FF33CC' },
      { num: 8, text: 'ocho', color: '#009900' },
      { num: 9, text: 'nueve', color: '#00CCCC' },
      { num: 10, text: 'diez', color: '#FF3333' }
    ];

    let allCards = [];
    data.forEach(item => {
      // Create identical pairs for memory game
      allCards.push(item);
      allCards.push(item);
    });

    // 9 cards per page fits nicely on standard letter paper
    const cardsPerPage = 9;
    const container = document.getElementById('pages-container');

    for (let i = 0; i < allCards.length; i += cardsPerPage) {
      const pageCards = allCards.slice(i, i + cardsPerPage);
      
      const pageDiv = document.createElement('div');
      pageDiv.className = 'page';

      pageCards.forEach(item => {
        const cardDiv = document.createElement('div');
        cardDiv.className = 'card';
        cardDiv.style.color = item.color;
        
        cardDiv.innerHTML = `
          <div class="number">${item.num}</div>
          <div class="text">${item.text}</div>
        `;
        pageDiv.appendChild(cardDiv);
      });

      container.appendChild(pageDiv);
    }
  </script>
</body>
</html>
